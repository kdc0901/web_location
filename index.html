<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="자리배치" />
  <title>교실 자리배치</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>교실 자리배치</h1>
      <p class="subtitle">8두레 · 총 38명</p>
    </header>

    <section class="search-panel">
      <label for="name-input" class="search-label">이름으로 자리 찾기</label>
      <div class="search-row">
        <input
          id="name-input"
          type="text"
          placeholder="예: 최서연, (초등) 이현주"
          autocomplete="off"
          list="name-suggestions"
        />
        <datalist id="name-suggestions"></datalist>
        <button type="button" id="search-btn">찾기</button>
      </div>
      <p id="result-message" class="result-message" aria-live="polite"></p>
    </section>

    <section class="classroom" aria-label="교실 배치도">
      <div class="blackboard" aria-hidden="true">
        <span>승현반 칠판 </span>
        <small>12시 방향</small>
      </div>

      <div class="groups-grid" id="groups-grid"></div>
    </section>

    <aside class="legend">
      <h2>그룹 위치</h2>
      <ul id="legend-list"></ul>
    </aside>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
