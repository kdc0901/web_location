<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="자리배치" />
  <title>교실 자리배치</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="css/style.css?v=7" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>교실 자리배치</h1>
      <p class="subtitle">8두레 · 총 38명</p>
    </header>

    <div class="top-section">
      <section class="search-panel" aria-label="이름으로 자리 찾기">
        <label for="name-input" class="search-label">이름으로 자리 찾기</label>
        <div class="search-row">
          <input
            id="name-input"
            type="search"
            inputmode="search"
            enterkeyhint="search"
            placeholder="이름 입력"
            autocomplete="off"
            list="name-suggestions"
          />
          <datalist id="name-suggestions"></datalist>
          <button type="button" id="search-btn">찾기</button>
        </div>
      </section>

      <div
        id="result-card"
        class="result-card result-card--idle"
        aria-live="polite"
        aria-label="검색 결과"
        hidden
      >
        <p class="result-card__hint"></p>
        <div class="result-card__body" hidden>
          <p class="result-card__name" id="result-name"></p>
          <p class="result-card__location" id="result-location"></p>
        </div>
      </div>
    </div>

    <section class="layout-section" aria-label="교실 전체 배치도">
      <h2 class="layout-title">전체배치도</h2>
      <div class="layout-map">
        <div class="blackboard" aria-hidden="true">
          <span>승현반 칠판</span>
          <small>12시 방향</small>
        </div>
        <div class="groups-grid" id="groups-grid"></div>
      </div>
    </section>

    <details class="legend-toggle">
      <summary>그룹 위치 안내</summary>
      <aside class="legend">
        <ul id="legend-list"></ul>
      </aside>
    </details>
  </div>

  <script src="js/data.js?v=7"></script>
  <script src="js/app.js?v=7"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
